<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun Guru - MDT Miftahul Hidayah</title>
    <meta name="description" content="Pendaftaran akun Guru / Ustadz MDT Miftahul Hidayah">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-main {
            background: radial-gradient(ellipse at 20% 30%, rgba(245,158,11,0.15) 0%, transparent 55%),
                        radial-gradient(ellipse at 80% 70%, rgba(16,185,129,0.12) 0%, transparent 50%),
                        #0a1628;
        }
        .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .input-field {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            color: white; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-field:focus { outline: none; border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.15); }
        .input-field::placeholder { color: rgba(255,255,255,0.3); }
    </style>
</head>
<body class="bg-main min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">

        <!-- Back -->
        <a href="/auth/login" class="flex items-center gap-2 text-slate-400 hover:text-white text-sm font-medium mb-8 transition-colors w-fit">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Kembali ke Pilihan Login
        </a>

        <!-- Card -->
        <div class="glass rounded-3xl p-8 shadow-2xl">

            <!-- Header -->
            <div class="flex items-center gap-4 mb-8">
                <div class="w-14 h-14 rounded-2xl bg-amber-500/20 border border-amber-500/30 flex items-center justify-center flex-shrink-0">
                    <svg class="h-7 w-7 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white">Daftar Akun Guru</h1>
                    <p class="text-amber-400/80 text-sm font-medium">MDT Miftahul Hidayah</p>
                </div>
            </div>

            <!-- Flash -->
            
              
            

            <form method="POST" action="/auth/register" class="space-y-5">

                <!-- Nama Lengkap -->
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Nama Lengkap</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4">
                            <svg class="h-4 w-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                        </div>
                        <input type="text" name="username" required placeholder="Ustadz / Ustadzah ..."
                               class="input-field w-full rounded-xl pl-11 pr-4 py-3 text-sm">
                    </div>
                </div>

                <!-- Email -->
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4">
                            <svg class="h-4 w-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/></svg>
                        </div>
                        <input type="email" name="email" required autocomplete="email"
                               placeholder="contoh@miftahulhidayah.com"
                               class="input-field w-full rounded-xl pl-11 pr-4 py-3 text-sm">
                    </div>
                </div>

                <!-- Jadwal & Kelas (2 kolom) -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Jadwal Mengajar</label>
                        <select name="prayer_session" id="prayer_session" required onchange="updateClassrooms()"
                                class="input-field w-full rounded-xl px-4 py-3 text-sm bg-[#162235] cursor-pointer">
                            <option value="">-- Pilih Jadwal --</option>
                            
                            <option value="Subuh">Subuh</option>
                            
                            <option value="Dzuhur">Dzuhur</option>
                            
                            <option value="Ashar">Ashar</option>
                            
                            <option value="Magrib">Magrib</option>
                            
                        </select>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Kelas</label>
                        <select name="classroom_id" id="classroom_id" required
                                class="input-field w-full rounded-xl px-4 py-3 text-sm bg-[#162235] cursor-pointer">
                            <option value="">-- Pilih Kelas --</option>
                            
                            <option value="1">Kelas Subuh 1 (Level 1)</option>
                            
                            <option value="2">Kelas Subuh 2 (Level 1)</option>
                            
                            <option value="3">Kelas Subuh 3 (Level 1)</option>
                            
                            <option value="4">Kelas Dzuhur 1 (Level 2)</option>
                            
                            <option value="5">Kelas Ashar 1 (Level 3)</option>
                            
                            <option value="6">Kelas Ashar 2 (Level 3)</option>
                            
                            <option value="7">Kelas Ashar 3 (Level 3)</option>
                            
                            <option value="8">Kelas Magrib 1 (Level 4)</option>
                            
                            <option value="9">Kelas Magrib 2 (Level 4)</option>
                            
                            <option value="10">Kelas Magrib 3 (Level 4)</option>
                            
                            <option value="11">Kelas Magrib 4 (Level 4)</option>
                            
                            <option value="12">Kelas Magrib 5 (Level 4)</option>
                            
                            <option value="13">Kelas Magrib 6 (Level 4)</option>
                            
                            <option value="14">Kelas Magrib 7 (Level 4)</option>
                            
                            <option value="15">Kelas Magrib 8 (Level 4)</option>
                            
                            <option value="16">Kelas Magrib 9 (Level 4)</option>
                            
                        </select>
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Kata Sandi</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4">
                            <svg class="h-4 w-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                        </div>
                        <input type="password" name="password" id="pwd" required autocomplete="new-password"
                               placeholder="Minimal 6 karakter"
                               class="input-field w-full rounded-xl pl-11 pr-12 py-3 text-sm">
                        <button type="button" onclick="togglePwd('pwd')"
                                class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-500 hover:text-slate-300 transition-colors">
                            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Konfirmasi Password -->
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Konfirmasi Kata Sandi</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4">
                            <svg class="h-4 w-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                        </div>
                        <input type="password" name="confirm_password" id="pwdConfirm" required autocomplete="new-password"
                               placeholder="Ulangi kata sandi"
                               class="input-field w-full rounded-xl pl-11 pr-12 py-3 text-sm">
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit"
                        class="w-full py-3 px-6 bg-amber-600 hover:bg-amber-500 text-white font-bold rounded-xl transition-all duration-200 hover:shadow-lg hover:shadow-amber-500/30 hover:-translate-y-0.5 text-sm mt-2">
                    Daftar Akun
                </button>
            </form>

            <!-- Hint -->
            <div class="mt-6 p-4 rounded-xl bg-amber-500/10 border border-amber-500/20">
                <p class="text-xs text-amber-300/80 text-center">
                    Akun baru memerlukan <strong>aktivasi oleh Admin</strong> sebelum dapat digunakan.<br>
                    Sudah punya akun? <a href="/auth/guru/login" class="underline hover:text-amber-200">Masuk di sini</a>.
                </p>
            </div>
        </div>
    </div>

    <script>
    function togglePwd(id) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    function updateClassrooms() {
        const sessionSelect = document.getElementById('prayer_session');
        const classSelect = document.getElementById('classroom_id');
        if (!sessionSelect || !classSelect) return;

        const selectedSession = sessionSelect.value;
        const sessionClassrooms = {"Ashar": [{"id": 5, "name": "Kelas Ashar 1"}, {"id": 6, "name": "Kelas Ashar 2"}, {"id": 7, "name": "Kelas Ashar 3"}], "Dzuhur": [{"id": 4, "name": "Kelas Dzuhur 1"}], "Magrib": [{"id": 8, "name": "Kelas Magrib 1"}, {"id": 9, "name": "Kelas Magrib 2"}, {"id": 10, "name": "Kelas Magrib 3"}, {"id": 11, "name": "Kelas Magrib 4"}, {"id": 12, "name": "Kelas Magrib 5"}, {"id": 13, "name": "Kelas Magrib 6"}, {"id": 14, "name": "Kelas Magrib 7"}, {"id": 15, "name": "Kelas Magrib 8"}, {"id": 16, "name": "Kelas Magrib 9"}], "Subuh": [{"id": 1, "name": "Kelas Subuh 1"}, {"id": 2, "name": "Kelas Subuh 2"}, {"id": 3, "name": "Kelas Subuh 3"}]};
        const currentSelected = classSelect.value;

        // Bersihkan pilihan kelas
        classSelect.innerHTML = '<option value="">-- Pilih Kelas --</option>';

        if (selectedSession && sessionClassrooms[selectedSession]) {
            const classes = sessionClassrooms[selectedSession];
            classes.forEach(function(cls) {
                const opt = document.createElement('option');
                opt.value = cls.id;
                opt.textContent = cls.name;
                if (String(cls.id) === String(currentSelected)) {
                    opt.selected = true;
                }
                classSelect.appendChild(opt);
            });
        } else {
            // Jika tidak ada session terpilih, masukkan semua kelas default
            
            const opt = document.createElement('option');
            opt.value = "1";
            opt.textContent = "Kelas Subuh 1 (Level 1)";
            if ("1" === String(currentSelected)) {
                opt.selected = true;
            }
            classSelect.appendChild(opt);
            
            const opt = document.createElement('option');
            opt.value = "2";
            opt.textContent = "Kelas Subuh 2 (Level 1)";
            if ("2" === String(currentSelected)) {
                opt.selected = true;
            }
            classSelect.appendChild(opt);
            
            const opt = document.createElement('option');
            opt.value = "3";
            opt.textContent = "Kelas Subuh 3 (Level 1)";
            if ("3" === String(currentSelected)) {
                opt.selected = true;
            }
            classSelect.appendChild(opt);
            
            const opt = document.createElement('option');
            opt.value = "4";
            opt.textContent = "Kelas Dzuhur 1 (Level 2)";
            if ("4" === String(currentSelected)) {
                opt.selected = true;
            }
            classSelect.appendChild(opt);
            
            const opt = document.createElement('option');
            opt.value = "5";
            opt.textContent = "Kelas Ashar 1 (Level 3)";
            if ("5" === String(currentSelected)) {
                opt.selected = true;
            }
            classSelect.appendChild(opt);
            
            const opt = document.createElement('option');
            opt.value = "6";
            opt.textContent = "Kelas Ashar 2 (Level 3)";
            if ("6" === String(currentSelected)) {
                opt.selected = true;
            }
            classSelect.appendChild(opt);
            
            const opt = document.createElement('option');
            opt.value = "7";
            opt.textContent = "Kelas Ashar 3 (Level 3)";
            if ("7" === String(currentSelected)) {
                opt.selected = true;
            }
            classSelect.appendChild(opt);
            
            const opt = document.createElement('option');
            opt.value = "8";
            opt.textContent = "Kelas Magrib 1 (Level 4)";
            if ("8" === String(currentSelected)) {
                opt.selected = true;
            }
            classSelect.appendChild(opt);
            
            const opt = document.createElement('option');
            opt.value = "9";
            opt.textContent = "Kelas Magrib 2 (Level 4)";
            if ("9" === String(currentSelected)) {
                opt.selected = true;
            }
            classSelect.appendChild(opt);
            
            const opt = document.createElement('option');
            opt.value = "10";
            opt.textContent = "Kelas Magrib 3 (Level 4)";
            if ("10" === String(currentSelected)) {
                opt.selected = true;
            }
            classSelect.appendChild(opt);
            
            const opt = document.createElement('option');
            opt.value = "11";
            opt.textContent = "Kelas Magrib 4 (Level 4)";
            if ("11" === String(currentSelected)) {
                opt.selected = true;
            }
            classSelect.appendChild(opt);
            
            const opt = document.createElement('option');
            opt.value = "12";
            opt.textContent = "Kelas Magrib 5 (Level 4)";
            if ("12" === String(currentSelected)) {
                opt.selected = true;
            }
            classSelect.appendChild(opt);
            
            const opt = document.createElement('option');
            opt.value = "13";
            opt.textContent = "Kelas Magrib 6 (Level 4)";
            if ("13" === String(currentSelected)) {
                opt.selected = true;
            }
            classSelect.appendChild(opt);
            
            const opt = document.createElement('option');
            opt.value = "14";
            opt.textContent = "Kelas Magrib 7 (Level 4)";
            if ("14" === String(currentSelected)) {
                opt.selected = true;
            }
            classSelect.appendChild(opt);
            
            const opt = document.createElement('option');
            opt.value = "15";
            opt.textContent = "Kelas Magrib 8 (Level 4)";
            if ("15" === String(currentSelected)) {
                opt.selected = true;
            }
            classSelect.appendChild(opt);
            
            const opt = document.createElement('option');
            opt.value = "16";
            opt.textContent = "Kelas Magrib 9 (Level 4)";
            if ("16" === String(currentSelected)) {
                opt.selected = true;
            }
            classSelect.appendChild(opt);
            
        }
    }

    // Jalankan sekali saat halaman dimuat
    if (document.readyState !== 'loading') {
        updateClassrooms();
    } else {
        document.addEventListener('DOMContentLoaded', updateClassrooms);
    }
    </script>
</body>
</html>
