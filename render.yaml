services:
  - type: web
    name: mdt-miftahul-hidayah
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 3 "app:create_app()"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mdt-database
          property: connectionString
      - key: FLASK_ENV
        value: production

databases:
  - name: mdt-database
    plan: free
    databaseName: mdt
    user: mdtuser